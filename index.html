<!DOCTYPE html>
<html lang="en">
<head>

  <title>Mirza Ghalib Apps</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1>Mirza Ghalib Apps</h1>
  </header>

  <!-- Grid -->
  <main>
    <div id="appGrid" class="grid"></div>

</body>
</html>
